<body>
    <form method="post" enctype="application/x-www-form-urlencoded">
        <fieldset>
            <legend><b>ĐĂNG NHẬP</b></legend>

            <table>
                <tr>
                    <td></td>
                    <td><img src="images/dangnhap/userlogin.png" width="200" alt=""></td>
                </tr>
                <tr>
                    <td>
                        <label for="UserEmail"><b>Email</b></label>
                    </td>
                    <td><input type="text" name="email" id="UserEmail" placeholder="Nhập email"></td>
                </tr>
                <tr>
                    <td>
                        <label for="UserPassword"><b>Mật khẩu</b></label>
                    </td>
                    <td><input type="password" name="psw" id="UserPassword" placeholder="Nhập mật khẩu"></td>
                </tr>
                <tr>

                    <td colspan="2">

                        <center>
                            <input type="submit" value="Đăng Nhập">
                            <input type="reset" value="Hủy">
                        </center>

                    </td>
                </tr>
                <tr>
                    <td colspan="2"><b>Bạn quên <a href="#">Mật Khẩu?</a> <input type="checkbox" name="remember">Ghi nhớ
                            cho
                            lần đăng nhập sau</b></td>

                </tr>
            </table>
        </fieldset>
    </form>
