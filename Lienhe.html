<body>
    <h1>Liên hệ</h1>
    <img src="images/lienhe/check-in.png" alt="">
    <h1>Địa chỉ: 0123, Tòa Nhà ABC, TP. Cần Thơ</h1>

    <p>Nếu bạn có góp ý, vui lòng liên hệ bằng thư điện tử hoặc sử dụng biểu mẫu bên dưới. Xin cám ơn.</p>

    <form action="" method="post" enctype="application/x-www-form-urlencoded">
        <fieldset>
            <legend>Góp ý</legend>

            <table>
                <tr>
                    <td>
                        <label for="UserName">Họ Tên:</label>

                    </td>
                    <td>
                        <input type="text" name="name" id="UserName" placeholder="Vui lòng nhập Họ tên của bạn">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="UserEmail">Email:</label>

                    </td>
                    <td>
                        <input type="text" name="email" id="UserEmail" placeholder="Vui lòng nhập địa chỉ Email">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Topic">Chủ đề:</label>

                    </td>
                    <td>
                        <select name="topic" id="Topic" size="1">
                            <option value="Về Sản Phẩm/Dịch Vụ">Về Sản Phẩm/Dịch Vụ</option>
                            <option value="Về Ưu Đãi Thành Viên">Về Ưu Đãi Thành Viên</option>
                            <option value="Về Tin Tuyển Dụng">Về Tin Tuyển Dụng</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2"><label for="Content">Nội dung:</label> </td>

                </tr>
                <tr>
                    <td colspan="2">
                        <textarea name="content" id="Content" rows="7" cols="50"
                            placeholder="Nội dung cần liên hệ"></textarea>
                    </td>
                </tr>

                <tr >
                    
                    <td colspan="2">
                        <center><input type="submit" value="Gửi" ></center>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
